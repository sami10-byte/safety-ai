<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Safety AI - تقارير السلامة</title><link rel="stylesheet" href="style.css"></head><body><main class="wrap"><section class="hero"><h1>Safety AI</h1><p>مولّد تقارير الصحة والسلامة المهنية بالذكاء الاصطناعي</p></section><section class="card"><label>اسم المشروع</label><input id="projectName" placeholder="مثال: مخطط درة الجنوب"><label>مسؤول السلامة</label><input id="safetyOfficer" placeholder="مثال: سامي الاسمري"><label>مدير المشروع</label><input id="managerName" placeholder="مثال: محمد حاتم"><label>موقع المخالفة</label><input id="location" placeholder="مثال: منطقة الحفر / الدور الثاني"><label>نوع أو وصف المخالفة</label><textarea id="violation" placeholder="اكتب وصف المخالفة هنا"></textarea><label>ملاحظات إضافية</label><textarea id="notes" placeholder="أي ملاحظات مهمة"></textarea><button onclick="generateReport()">توليد التقرير</button></section><section class="card"><h2>التقرير</h2><pre id="report">سيظهر التقرير هنا...</pre><div class="actions"><button onclick="copyReport()">نسخ التقرير</button><button onclick="window.print()">طباعة / حفظ PDF</button></div></section></main><script src="app.js"></script></body></html>
