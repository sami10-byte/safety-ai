<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Safety AI | سامي الاسمري</title><link rel="stylesheet" href="style.css"/></head><body>
<header class="top"><div><h1>Safety AI</h1><p>منشئ موقع الذكاء الاصطناعي: سامي الاسمري</p></div><nav><button onclick="showTab('new')">تقرير جديد</button><button onclick="showTab('saved')">التقارير المحفوظة</button></nav></header>
<main>
<section id="new" class="panel">
  <div class="form-card"><h2>بيانات التقرير</h2>
    <div class="grid"><label>اسم المشروع<input id="projectName" value="مخطط درة الجنوب"></label><label>مسؤول السلامة<input id="safetyOfficer" value="سامي الاسمري"></label><label>مدير المشروع<input id="projectManager" placeholder="اكتب اسم مدير المشروع"></label></div>
    <h3>المخالفات المرصودة</h3><div id="violations"></div><button class="secondary" onclick="addViolation()">+ إضافة مخالفة</button>
    <label>ملاحظات عامة<textarea id="notes" placeholder="اكتب ملاحظات عامة إن وجدت"></textarea></label>
    <div class="actions"><button onclick="generateReport()">توليد التقرير الاحترافي</button><button class="secondary" onclick="saveReport()">حفظ التقرير</button><button class="secondary" onclick="window.print()">طباعة / PDF</button></div>
  </div>
  <div id="report" class="report-shell"></div>
</section>
<section id="saved" class="panel hidden"><h2>التقارير المحفوظة</h2><div id="savedList" class="saved-list"></div></section>
</main><script src="app.js"></script></body></html>
